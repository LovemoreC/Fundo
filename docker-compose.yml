version: '3.9'

services:
  server:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: make server
    ports:
      - "8000:8000"

  web:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: make web
    ports:
      - "3000:3000"
