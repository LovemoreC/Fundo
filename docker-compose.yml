version: '3.9'

services:
  server:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./server:/app
    command: sh -c "pip install -r requirements.txt && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - server/.env
    ports:
      - "8000:8000"

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./web:/app
    command: npm run dev
    env_file:
      - web/.env
    ports:
      - "3000:3000"
